<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, follow">
  <title>Страница не найдена — ШТОЛЛИ</title>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="120x120" href="/favicon-120x120.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <style>
    :root { --bg:#f6f2ec; --ink:#211d17; --muted:#5c554a; --bronze:#8a6135; --bronze-dark:#6e4d2b; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg); color: var(--ink);
      font-family: 'Manrope', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      text-align: center; padding: 2rem; line-height: 1.6;
    }
    .e404 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(4.5rem, 22vw, 10rem); line-height: 1;
      color: var(--bronze); margin: 0;
    }
    h1 {
      font-family: 'Playfair Display', Georgia, serif; font-weight: 600;
      font-size: clamp(1.4rem, 5vw, 2.1rem); margin: 0.25rem 0 1rem;
    }
    p { color: var(--muted); max-width: 34rem; margin: 0 auto 2rem; }
    a.btn {
      display: inline-block; background: var(--bronze); color: #fff;
      text-decoration: none; padding: 0.9rem 1.9rem; border-radius: 3px;
      font-weight: 600; transition: background .25s ease;
    }
    a.btn:hover { background: var(--bronze-dark); }
    .links { margin-top: 1.6rem; font-size: 0.95rem; }
    .links a { color: var(--bronze); text-decoration: underline; margin: 0 0.6rem; }
  </style>
</head>
<body>
  <main>
    <p class="e404">404</p>
    <h1>Страница не найдена</h1>
    <p>Возможно, адрес введён с&nbsp;ошибкой или страница была перемещена. Вернитесь на&nbsp;главную или посмотрите наши работы, услуги и&nbsp;блог мастерской художественного литья ШТОЛЛИ.</p>
    <a class="btn" href="/">На главную</a>
    <div class="links">
      <a href="/#gallery">Галерея</a>
      <a href="/#services">Услуги</a>
      <a href="/blog.html">Блог</a>
      <a href="/#contacts">Контакты</a>
    </div>
  </main>
</body>
</html>
